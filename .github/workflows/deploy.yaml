name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod
          submodules: recursive
          token: ${{ secrets.PUBLISH_TOKEN }}

      - name: Debug content input
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Submodule status"
          git submodule status
          echo "List content directory"
          ls -lah content
          echo "Find markdown files (first 100)"
          find content -type f -name "*.md" | sed -n '1,100p'
          echo "Total markdown files"
          find content -type f -name "*.md" | wc -l

      - name: Build Link Index
        uses: jackyzha0/hugo-obsidian@v2.20
        with:
          index: true
          input: content
          output: assets/indices
          root: .

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.159.0"
          # hugo-version: '0.96.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PUBLISH_TOKEN }}
          publish_dir: ./public
          publish_branch: deploy # deploying branch
          commit_message: "Deploy to GitHub Pages"
          cname: dlliang14.github.io
